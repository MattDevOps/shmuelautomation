# Fly config for the Baileys WhatsApp daemon.
#
# Single always-on machine in Amsterdam (closest Fly region to the
# backend on Cloud Run europe-west1). The daemon holds a long-lived
# WebSocket to WhatsApp — scale-to-zero would drop the pairing.
#
# Auth state is persisted to the backend's Postgres via /whatsapp/session/blob
# so we deliberately do NOT attach a Fly volume — the machine is fully
# replaceable, redeploy without re-scanning the QR.

app = "shmuel-whatsapp"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8787"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 8787
  force_https = true
  # Never auto-stop or scale to zero — Baileys WebSocket would drop.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
